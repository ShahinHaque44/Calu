name: Build Release APK

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Generate Keystore
      run: |
        keytool -genkey -v -keystore release.keystore -alias myapp \
          -keyalg RSA -keysize 2048 -validity 10000 \
          -storepass password -keypass password \
          -dname "CN=Unknown, OU=Unknown, O=Unknown, L=Unknown, ST=Unknown, C=Unknown"

    - name: Build Release APK
      run: |
        echo "RELEASE_STORE_FILE=release.keystore" >> local.properties
        echo "RELEASE_STORE_PASSWORD=password" >> local.properties
        echo "RELEASE_KEY_ALIAS=myapp" >> local.properties
        echo "RELEASE_KEY_PASSWORD=password" >> local.properties
        ./gradlew assembleRelease

    - name: Upload to Release
      uses: softprops/action-gh-release@v1
      if: startsWith(github.ref, 'refs/tags/')
      with:
        files: app/build/outputs/apk/release/*.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
